# Isolate layers 30-50% of model depth
# Pattern: zero all layers first, then enable a specific range
name: layers_30_50
adapters:
  - organism_name: persona_sarcasm
    variant: default
    layer_amplifications:
      - layers: "all"
        is_relative: false
        module_amplifications:
          - modules: all
            weight: 0
      - layers:
          type: range
          start: 0.3
          end: 0.5
        is_relative: true
        module_amplifications:
          - modules: all
            weight: 1.0
